- defaults:
    link:
      relink: true

- link:
    ~/.zshrc.platform: linux/zshrc.platform
    ~/.zshenv.platform: linux/zshenv.platform
    ~/.config/alacritty/alacritty-platform.toml:
      force: true
      path: linux/config/alacritty/alacritty-linux.toml
    ~/.config/ghostty/ghostty-platform:
      force: true
      path: linux/config/ghostty/ghostty-linux
